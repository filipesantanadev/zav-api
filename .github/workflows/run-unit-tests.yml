name: Run Unit Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: write

jobs:
  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com cobertura
        run: npm run test:coverage

      - name: Gerar coverage-badge.json
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COVERAGE=$(node -e "
            const s = JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json'));
            console.log(Math.round(s.total.lines.pct));
          ")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green"
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow"
          else COLOR="red"; fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$COVERAGE" "$COLOR" > coverage-badge.json

      - name: Commit e push do badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.json
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
