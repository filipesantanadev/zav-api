version: "3"

services:
  api-zav-pg:
    image: bitnami/postgresql:latest
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRESQL_USERNAME=docker
      - POSTGRESQL_PASSWORD=docker
      - POSTGRESQL_DATABASE=apizav
    volumes:
      - postgres_data:/bitnami/postgresql
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
